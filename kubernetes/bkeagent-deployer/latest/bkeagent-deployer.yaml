apiVersion: v1
kind: Namespace
metadata:
  name: cluster-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bkeagent-deployer
  namespace: cluster-system
  labels:
    app: bkeagent-deployer
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: bkeagent-deployer
  template:
    metadata:
      labels:
        app: bkeagent-deployer
    spec:
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: deployer
          image: {{ if .repo }}{{ .repo }}{{ else }}cr.openfuyao.cn/openfuyao/{{ end }}bkeagent-deployer:{{ .tagVersion }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          env:
            - name: HOST_BIN_DIR
              value: /etc/openFuyao/bkeagent/bin
            - name: HEALTH_PORT
              value: "8443"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: host-bin
              mountPath: /etc/openFuyao/bkeagent/bin
            - name: k8s-dir
              mountPath: /etc/kubernetes
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: host-bin
          hostPath:
            path: /etc/openFuyao/bkeagent/bin
            type: DirectoryOrCreate
        - name: k8s-dir
          hostPath:
            path: /etc/kubernetes
            type: Directory