  selector:
    matchLabels:
      cluster.x-k8s.io/provider: infrastructure-bke
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
      labels:
        cluster.x-k8s.io/provider: infrastructure-bke
        control-plane: controller-manager
    spec:
      containers:
        - command:
            - /manager
            - --metrics-bind-address=:8080
            - --leader-elect=true
            - --health-probe-bind-address=:8081
            - --health-probe-scheme=https
            - --health-probe-port=9444
          env:
            - name: container
              value: "true"
            - name: DEBUG
              value: "true"
            - name: ALLOWED_FAILED_COUNT
              value: "3"
          image: {{ if .repo }}{{ .repo }}{{ else }}cr.openfuyao.cn/openfuyao/{{ end }}cluster-api-provider-bke:{{ .providerVersion }}
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9444
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
            - containerPort: 9444
              name: health-probe
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9444
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 200Mi
          securityContext:
            allowPrivilegeEscalation: true
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
            - mountPath: /var/log
              name: log
            - mountPath: /etc/localtime
              name: localtime
            - mountPath: /manifests
              name: manifests
            - mountPath: /etc/openFuyao
              name: repo-cert
              readOnly: true
            - mountPath: /etc/kubernetes
              name: k8s-dir
              readOnly: true
      initContainers:
        - command:
            - /bin/sh
            - -c
            - cp -rf . /manifests
          image: {{ if .repo }}{{ .repo }}{{ else }}cr.openfuyao.cn/openfuyao/{{ end }}bke-manifests:{{ .manifestsVersion }}
          imagePullPolicy: Always
          name: manifests
          volumeMounts:
            - mountPath: /manifests
              name: manifests
      securityContext:
        runAsNonRoot: false
      serviceAccountName: bke-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: bke-webhook-secret
        - hostPath:
            path: /var/log
            type: Directory
          name: log
        - hostPath:
            path: /etc/localtime
          name: localtime
        - hostPath:
            path: /etc/openFuyao/addons/manifests
            type: DirectoryOrCreate
          name: manifests
        - hostPath:
            path: /etc/openFuyao
            type: DirectoryOrCreate
          name: repo-cert
        - name: k8s-dir
          hostPath:
            path: /etc/kubernetes
            type: Directory
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    cluster.x-k8s.io/provider: infrastructure-bke
    control-plane: controller-manager
  name: bke-controller-manager-metrics-monitor
  namespace: cluster-system
spec:
  endpoints:
    - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      path: /metrics
      port: metrics
  selector:
    matchLabels:
      cluster.x-k8s.io/provider: infrastructure-bke
      control-plane: controller-manager
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: cluster-system/bke-serving-cert
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/created-by: cluster-api-provider-bke
    app.kubernetes.io/instance: mutating-webhook-configuration
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mutatingwebhookconfiguration
    app.kubernetes.io/part-of: cluster-api-provider-bke
    cluster.x-k8s.io/provider: infrastructure-bke
  name: bke-mutating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      caBundle: 
      service:
        name: bke-webhook-service
        namespace: cluster-system
        path: /mutate-bke-bocloud-com-v1beta1-bkecluster
    failurePolicy: Fail
    name: mbkecluster.kb.io
    rules:
      - apiGroups:
          - bke.bocloud.com
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - bkeclusters
    sideEffects: None
---
