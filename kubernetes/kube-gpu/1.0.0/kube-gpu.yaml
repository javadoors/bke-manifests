---
apiVersion: v1
kind: ConfigMap
metadata:
  creationTimestamp: null
  name: agent-config
  namespace: gpu-system
data:
  extra-config.json: |
    {}
  volume.conf: |
    {
      "volume": [
        {
          "name": "nvidia",
          "base": "/etc/gpu-agent/vdriver",
          "mode": "ro",
          "components": {
            "binaries": [
              "nvidia-cuda-mps-control",
              "nvidia-cuda-mps-server",
              "nvidia-debugdump",
              "nvidia-persistenced",
              "nvidia-smi",
              "gpu-client"
            ],
            "libraries": [
              "libnvidia-ml.so",
              "libcuda.so",
              "libcuda-control.so",
              "libnvidia-ptxjitcompiler.so",
              "libnvidia-fatbinaryloader.so",
              "libnvidia-opencl.so",
              "libnvidia-compiler.so",
              "libvdpau_nvidia.so",
              "libnvidia-encode.so",
              "libnvcuvid.so",
              "libnvidia-fbc.so",
              "libnvidia-ifr.so",
              "libGL.so",
              "libGLX.so",
              "libOpenGL.so",
              "libGLESv1_CM.so",
              "libGLESv2.so",
              "libEGL.so",
              "libGLdispatch.so",
              "libGLX_nvidia.so",
              "libEGL_nvidia.so",
              "libGLESv2_nvidia.so",
              "libGLESv1_CM_nvidia.so",
              "libnvidia-eglcore.so",
              "libnvidia-egl-wayland.so",
              "libnvidia-glcore.so",
              "libnvidia-tls.so",
              "libnvidia-glsi.so",
              "libnvidia-opticalflow.so"
            ]
          }
        },
        {
          "name": "origin",
          "base": "/etc/gpu-agent/vdriver",
          "mode": "ro",
          "components": {
            "binaries": [
              "nvidia-cuda-mps-control",
              "nvidia-cuda-mps-server",
              "nvidia-debugdump",
              "nvidia-persistenced",
              "nvidia-smi"
            ],
            "libraries": [
              "libnvidia-ml.so",
              "libcuda.so",
              "libnvidia-ptxjitcompiler.so",
              "libnvidia-fatbinaryloader.so",
              "libnvidia-opencl.so",
              "libnvidia-compiler.so",
              "libvdpau_nvidia.so",
              "libnvidia-encode.so",
              "libnvcuvid.so",
              "libnvidia-fbc.so",
              "libnvidia-ifr.so",
              "libGL.so",
              "libGLX.so",
              "libOpenGL.so",
              "libGLESv1_CM.so",
              "libGLESv2.so",
              "libEGL.so",
              "libGLdispatch.so",
              "libGLX_nvidia.so",
              "libEGL_nvidia.so",
              "libGLESv2_nvidia.so",
              "libGLESv1_CM_nvidia.so",
              "libnvidia-eglcore.so",
              "libnvidia-egl-wayland.so",
              "libnvidia-glcore.so",
              "libnvidia-tls.so",
              "libnvidia-glsi.so",
              "libnvidia-opticalflow.so"
            ]
          }
        }
      ]
    }
  copy-bin-lib.sh: |
    #!/bin/bassh

    set -o pipefail
    set -o errexit
    set -o nounset

    FILE=${FILE:-"/etc/gpu-agent/volume.conf"}
    LIB_FILES=$(jq -r .volume[1].components.libraries[] ${FILE})
    BIN_FILES=$(jq -r .volume[1].components.binaries[] ${FILE})
    readonly NV_DIR="/usr/local/nvidia"
    readonly FIND_BASE=${FIND_BASE:-"/usr/local/host"}

    function check_arch() {
      local readonly lib=$1
      if [[ $(objdump -f ${lib} | grep -o "elf64-x86-64") == "elf64-x86-64" ]]; then
        echo "64"
      else
        echo ""
      fi
    }

    function copy_lib() {
      for target in $(find ${FIND_BASE} -name "${1}*" | grep -v "stubs"); do
        if [[ $(objdump -p ${target} 2>/dev/null | grep -o "SONAME") == "SONAME" ]]; then
          copy_directory ${target} "${NV_DIR}/lib$(check_arch ${target})"
        fi
      done
    }

    function copy_bin() {
      for target in $(find ${FIND_BASE} -name "${1}"); do
        if [[ -L ${target} ]]; then
          echo "${target} is symlink"
          continue
        fi
        copy_directory ${target} "${NV_DIR}/bin/"
      done
    }

    function copy_directory() {
      local readonly lib=$1
      local readonly path=$2

      echo "copy ${lib} to ${path}"
      cp -Pf "${lib}" "${path}"
    }

    rm -rf ${NV_DIR}
    mkdir -p ${NV_DIR}/{bin,lib,lib64}

    for file in ${LIB_FILES[@]}; do
      copy_lib ${file}
    done

    for file in ${BIN_FILES[@]}; do
      copy_bin ${file}
    done

    # fix libvdpau_nvidia.so
    (
      cd ${NV_DIR}/lib
      rm -rf libvdpau_nvidia.so
      rel_path=$(readlink -f libvdpau_nvidia.so.1)
      ln -s $(basename ${rel_path}) libvdpau_nvidia.so
    )

    (
      cd ${NV_DIR}/lib64
      rm -rf libvdpau_nvidia.so
      rel_path=$(readlink -f libvdpau_nvidia.so.1)
      ln -s $(basename ${rel_path}) libvdpau_nvidia.so
    )

    # fix libnvidia-ml.so
    (
      cd ${NV_DIR}/lib
      rm -rf libnvidia-ml.so
      rel_path=$(readlink -f libnvidia-ml.so.1)
      ln -s $(basename ${rel_path}) libnvidia-ml.so
    )

    (
      cd ${NV_DIR}/lib64
      rm -rf libnvidia-ml.so
      rel_path=$(readlink -f libnvidia-ml.so.1)
      ln -s $(basename ${rel_path}) libnvidia-ml.so
    )

  ld.sh: |
    #!/bin/bash

    set -o errexit
    set -o pipefail
    set -o nounset

    source /etc/gpu-agent/copy-bin-lib.sh

    echo "rebuild ldcache"
    /usr/glibc-compat/sbin/ldconfig -f /etc/ld.so.conf
    echo "ld ok"
  start.sh: |
    #!/bin/bash
    /etc/gpu-agent/ld.sh
    /app/kube-gpu agent --extra-config=/etc/gpu-agent/extra-config.json \
          - --v=${LOG_LEVEL} \
          - --hostname-override=${NODE_NAME} \
          - --namespace=${NameSpace} \
          - --share-mode=true \
          - --volume-config=/etc/gpu-agent/volume.conf \
          - --log-dir=/var/log/gpu-agent \
          - --query-addr=0.0.0.0 \
          - --logtostderr=false \
          - --cgroup-driver=systemd \
          - --container-runtime-endpoint={{ .criSock }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-controller
  namespace: gpu-system
  labels:
    control-plane: gpu-controller
spec:
  selector:
    matchLabels:
      control-plane: gpu-controller
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: gpu-controller
      labels:
        control-plane: gpu-controller
    spec:
      serviceAccountName: gpu-controller
      volumes:
        - name: configs
          configMap:
            name: controller-config
            defaultMode: 0666
        - name: log
          hostPath:
            path: /var/log/gpu-controller
            type: DirectoryOrCreate
        - name: tz-config
          hostPath:
            path: /etc/localtime
      containers:
        - command:
            - /app/kube-gpu
            - server
          args:
            - --log-level=info
            - --reconciler-period=60
            - --namespace=$(GPU_NAMESPACE)
          image: {{ .repo }}kube-gpu:1.0.0
          imagePullPolicy: IfNotPresent
          name: gpu-controller
          volumeMounts:
            - mountPath: /etc/gpu-controller
              name: configs
            - mountPath: /var/log/gpu-controller
              name: log
            - name: tz-config
              mountPath: /etc/localtime
              readOnly: true
          env:
            - name: GPU_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8081
              name: probe
            - containerPort: 8082
              name: metrics
            - containerPort: 8080
              name: grpc
            - containerPort: 9443
              name: controller
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-agent
  namespace: gpu-system
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      name: gpu-agent
  template:
    metadata:
      annotations:
        beyondac.admission.kubernetes.io/exclude: "true"
        beyondac.admission.kubernetes.io/mutator-exclude: "true"
        prometheus.io/port: "5678"
        prometheus.io/scrape: "true"
      creationTimestamp: null
      labels:
        name: gpu-agent
    spec:
      containers:
        - command:
            - /etc/gpu-agent/start.sh
          env:
            - name: LOG_LEVEL
              value: "1"
            - name: NameSpace
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: LD_LIBRARY_PATH
              value: "/usr/local/nvidia/lib64/:/usr/local/nvidia/lib/"
          image: {{ .repo }}kube-gpu:1.0.0
          imagePullPolicy: IfNotPresent
          name: gpu-agent
          ports:
            - containerPort: 5678
              protocol: TCP
          resources:
            limits:
              cpu: 400m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
          securityContext:
            privileged: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /etc/os-release
              name: host-etc-release
            - mountPath: /var/lib/kubelet/device-plugins
              name: device-plugin
            - mountPath: /etc/gpu-agent/vdriver
              name: vdriver
            - mountPath: /etc/gpu-agent
              name: configs
            - mountPath: /etc/gpu-agent/vm
              name: vmdata
            - mountPath: /var/log/gpu-agent
              name: log
            - mountPath: /etc/gpu-agent/checkpoint
              name: checkpoint
            - mountPath: /var/run
              name: run-dir
            - mountPath: /sys/fs/cgroup
              name: cgroup
              readOnly: true
            - mountPath: /usr/local/host
              name: usr-directory
              readOnly: true
      dnsPolicy: ClusterFirstWithHostNet
      hostPID: true
      nodeSelector:
        gpu-device-enable: enable
      priorityClassName: system-node-critical
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccountName: gpu-controller
      terminationGracePeriodSeconds: 30
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - effect: NoSchedule
          key: bocloud.com/vcuda-core
          operator: Exists
      volumes:
        - hostPath:
            path: /etc/os-release
          name: host-etc-release
        - hostPath:
            path: {{.kubeletDataRoot}}/device-plugins
            type: Directory
          name: device-plugin
        - hostPath:
            path: /etc/gpu-agent/vm
            type: DirectoryOrCreate
          name: vmdata
        - hostPath:
            path: /etc/gpu-agent/vdriver
            type: DirectoryOrCreate
          name: vdriver
        - name: configs
          configMap:
            name: agent-config
            defaultMode: 0777
        - hostPath:
            path: /var/log/gpu-agent
            type: DirectoryOrCreate
          name: log
        - hostPath:
            path: /etc/gpu-agent/checkpoint
            type: DirectoryOrCreate
          name: checkpoint
        - hostPath:
            path: /var/run
            type: Directory
          name: run-dir
        - hostPath:
            path: /sys/fs/cgroup
            type: Directory
          name: cgroup
        - hostPath:
            path: /usr
            type: Directory
          name: usr-directory
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate

