roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: katib-ui
subjects:
  - kind: ServiceAccount
    name: katib-ui
    namespace: kubeflow
---
apiVersion: v1
data:
  early-stopping: |-
    {
      "medianstop": {
        "image": "{{ .repo }}kubeflowkatib/earlystopping-medianstop:v0.15.0"
      }
    }
  metrics-collector-sidecar: |-
    {
      "StdOut": {
        "image": "{{ .repo }}kubeflowkatib/file-metrics-collector:v0.15.0"
      },
      "File": {
        "image": "{{ .repo }}kubeflowkatib/file-metrics-collector:v0.15.0"
      }
    }
  suggestion: |-
    {
      "random": {
        "image": "{{ .repo }}kubeflowkatib/suggestion-hyperopt:v0.15.0"
      },
      "tpe": {
        "image": "{{ .repo }}kubeflowkatib/suggestion-hyperopt:v0.15.0"
      },
      "grid": {
        "image": "{{ .repo }}kubeflowkatib/suggestion-optuna:v0.15.0"
      },
      "bayesianccoptimization": {
        "image": "{{ .repo }}kubeflowkatib/suggestion-skopt:v0.15.0"
      },
      "multivariate-tpe": {
        "image": "{{ .repo }}kubeflowkatib/suggestion-optuna:v0.15.0"
      }
    }
kind: ConfigMap
metadata:
  name: katib-config
  namespace: kubeflow
---
apiVersion: v1
data:
  defaultTrialTemplate.yaml: |-
    apiVersion: batch/v1
    kind: Job
    spec:
      template:
        spec:
          containers:
            - name: training-container
              image: {{ .repo }}kubeflowkatib/mxnet-mnist:v0.15.0
              command:
                - "python3"
                - "/opt/mxnet-mnist/mnist.py"
                - "--batch-size=64"
                - "--lr=${trialParameters.learningRate}"
                - "--num-layers=${trialParameters.numberLayers}"
                - "--optimizer=${trialParameters.optimizer}"
          restartPolicy: Never
  enasCPUTemplate: |-
    apiVersion: batch/v1
    kind: Job
    spec:
      template:
        spec:
          containers:
            - name: training-container
              image: {{ .repo }}kubeflowkatib/enas-cnn-cifar10-cpu:v0.15.0
              command:
                - python3
                - -u
                - RunTrial.py
                - --num_epochs=1
                - "--architecture=\"${trialParameters.neuralNetworkArchitecture}\""
                - "--nn_config=\"${trialParameters.neuralNetworkConfig}\""
          restartPolicy: Never
  pytorchJobTemplate: |-
    apiVersion: kubeflow.org/v1
    kind: PyTorchJob
    spec:
      pytorchReplicaSpecs:
        Master:
          replicas: 1
          restartPolicy: OnFailure
          template:
            spec:
              containers:
                - name: pytorch
                  image: {{ .repo }}kubeflowkatib/pytorch-mnist-cpu:v0.15.0
                  command:
                    - "python3"
                    - "/opt/pytorch-mnist/mnist.py"
                    - "--epochs=1"
                    - "--lr=${trialParameters.learningRate}"
                    - "--momentum=${trialParameters.momentum}"
        Worker:
          replicas: 2
          restartPolicy: OnFailure
          template:
            spec:
              containers:
                - name: pytorch
                  image: {{ .repo }}kubeflowkatib/pytorch-mnist-cpu:v0.15.0
                  command:
                    - "python3"
                    - "/opt/pytorch-mnist/mnist.py"
                    - "--epochs=1"
                    - "--lr=${trialParameters.learningRate}"
                    - "--momentum=${trialParameters.momentum}"
kind: ConfigMap
metadata:
  labels:
    katib.kubeflow.org/component: trial-templates
  name: trial-templates
  namespace: kubeflow
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/port: "8080"
    prometheus.io/scheme: http
    prometheus.io/scrape: "true"
  labels:
    katib.kubeflow.org/component: controller
  name: katib-controller
  namespace: kubeflow
spec:
  ports:
    - name: webhook
      port: 443
      protocol: TCP
      targetPort: 8443
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: healthz
      port: 18080
      targetPort: 18080
  selector:
    katib.kubeflow.org/component: controller
---
apiVersion: v1
kind: Service
metadata:
  labels:
    katib.kubeflow.org/component: db-manager
  name: katib-db-manager
  namespace: kubeflow
spec:
  ports:
    - name: api
      port: 6789
      protocol: TCP
  selector:
    katib.kubeflow.org/component: db-manager
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    katib.kubeflow.org/component: ui
  name: katib-ui
  namespace: kubeflow
spec:
  ports:
    - name: ui
      port: 80
      protocol: TCP
      targetPort: 8080
  selector:
    katib.kubeflow.org/component: ui
  type: NodePort

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    katib.kubeflow.org/component: controller
  name: katib-controller
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      katib.kubeflow.org/component: controller
  template:
    metadata:
      annotations:
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
        sidecar.istio.io/inject: "false"
      labels:
        katib.kubeflow.org/component: controller
    spec:
      containers:
        - args:
            - --webhook-port=8443
            - --trial-resources=Job.v1.batch
            - --trial-resources=TFJob.v1.kubeflow.org
            - --trial-resources=PyTorchJob.v1.kubeflow.org
            - --trial-resources=MPIJob.v1.kubeflow.org
            - --trial-resources=XGBoostJob.v1.kubeflow.org
            - --trial-resources=MXJob.v1.kubeflow.org
            - --trial-resources=Workflow.v1alpha1.argoproj.io
            - --trial-resources=Job.v1alpha1.batch.volcano.sh
          command:
            - ./katib-controller
          env:
            - name: KATIB_CORE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: {{ .repo }}kubeflowkatib/katib-controller:v0.15.0
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
          name: katib-controller
          ports:
            - containerPort: 8443
              name: webhook
              protocol: TCP
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 18080
              name: healthz
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
          volumeMounts:
            - mountPath: /tmp/cert
              name: cert
              readOnly: true
      serviceAccountName: katib-controller
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: katib-webhook-cert
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    katib.kubeflow.org/component: db-manager
  name: katib-db-manager
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      katib.kubeflow.org/component: db-manager
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        katib.kubeflow.org/component: db-manager
    spec:
      containers:
        - command:
            - ./katib-db-manager
          env:
            - name: DB_NAME
              value: mysql
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: MYSQL_ROOT_PASSWORD
                  name: katib-mysql-secrets
          image: {{ .repo }}kubeflowkatib/katib-db-manager:v0.15.0
          livenessProbe:
            exec:
              command:
                - /bin/grpc_health_probe
                - -addr=:6789
            failureThreshold: 5
            initialDelaySeconds: 10
            periodSeconds: 60
          name: katib-db-manager
          ports:
            - containerPort: 6789
              name: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    katib.kubeflow.org/component: ui
  name: katib-ui
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      katib.kubeflow.org/component: ui
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        katib.kubeflow.org/component: ui
    spec:
      containers:
        - args:
            - --port=8080
          command:
            - ./katib-ui
          env:
            - name: KATIB_CORE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: {{ .repo }}kubeflowkatib/katib-ui:v0.15.0
          name: katib-ui
          ports:
            - containerPort: 8080
              name: ui
      serviceAccountName: katib-ui
---
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    katib.kubeflow.org/component: cert-generator
  name: katib-cert-generator
  namespace: kubeflow
spec:
  backoffLimit: 4
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - args:
            - generate
            - --namespace=$(KATIB_CORE_NAMESPACE)
          command:
            - ./katib-cert-generator
          env:
            - name: KATIB_CORE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: {{ .repo }}kubeflowkatib/cert-generator:v0.15.0
          name: cert-generator
      restartPolicy: Never
      serviceAccountName: katib-cert-generator
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: katib.kubeflow.org
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      caBundle: Cg==
      service:
        name: katib-controller
        namespace: kubeflow
        path: /mutate-experiment
    failurePolicy: Ignore
    name: defaulter.experiment.katib.kubeflow.org
    rules:
      - apiGroups:
          - kubeflow.org
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - experiments
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      caBundle: Cg==
      service:
        name: katib-controller
        namespace: kubeflow
        path: /mutate-pod
    failurePolicy: Ignore
    name: mutator.pod.katib.kubeflow.org
    namespaceSelector:
      matchLabels:
        katib.kubeflow.org/metrics-collector-injection: enabled
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: katib.kubeflow.org
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      caBundle: Cg==
      service:
        name: katib-controller
        namespace: kubeflow
        path: /validate-experiment
    failurePolicy: Ignore
    name: validator.experiment.katib.kubeflow.org
    rules:
      - apiGroups:
          - kubeflow.org
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - experiments
    sideEffects: None
