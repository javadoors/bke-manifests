{{ $scriptDir := "/etc/openFuyao/bkeagent/scripts/" }}

apiVersion: bkeagent.bocloud.com/v1beta1
kind: Command
metadata:
  name: save-package-downloader-script
  namespace: {{.namespace}}
spec:
  commands:
    - backoffDelay: 3
      command:
        - "mkdir -p {{$scriptDir}}"
      id: mkdir-scripts
      type: Shell
    - backoffDelay: 3
      command:
        - "configmap:cluster-system/package-downloader.sh:ro:{{$scriptDir}}package-downloader.sh"
      id: save-package-downloader-script
      type: Kubernetes
    - backoffDelay: 3
      command:
        - "chmod +x {{$scriptDir}}package-downloader.sh"
      id: chmod-package-downloader-script
      type: Shell
  backoffLimit: 3
  nodeSelector:
    matchLabels:
    {{- $ips := split .nodesIps "," }}
    {{- range $ips }}
      {{ . }}: {{ . }}
    {{- end }}