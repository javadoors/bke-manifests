# 包含k8s1.21.1、bke组件和fabric cni 的amd64单架构打包yaml

registry:
  imageAddress: deploy.bocloud.k8s:40443/kubernetes/registry:2.8.1
  architecture:
    - amd64
repos:
  - architecture:
      - amd64
    sourceRepo: deploy.bocloud.k8s:40443/kubernetes
    targetRepo: kubernetes
    imageTrack: ""
    images:
      # base
      - name: k3s
        tag:
          - v1.25.16-k3s4
      - name: mirrored-pause
        tag:
          - 3.6
      - name: nfs-server-alpine
        tag:
          - 0.9.0
      - name: nginx_yum_repo
        tag:
          - 1.23.0-alpine
      - name: chartmuseum
        tag:
          - 0.15.0

      # tools
      - name: busybox
        tag:
          - 1.35
      # ha
      - name: keepalived
        tag:
          - 1.3.5
      - name: haproxy
        tag:
          - 2.1.4
      # bke
      - name: addons
        tag:
          - latest
      - name: bkeagent-launcher
        tag:
          - latest
      - name: bke-controller
        tag:
          - v1.0.0
      # cluster-api
      - name: cluster-api-controller
        tag:
          - v1.4.3
      - name: kubeadm-bootstrap-controller
        tag:
          - v1.4.3
      - name: kubeadm-control-plane-controller
        tag:
          - v1.4.3
      # fabric
      - name: fabric-node
        tag:
          - 2.7.4
      - name: fabric-ovs
        tag:
          - 2.13.7
      - name: fabric-ryu-controller
        tag:
          - 2.7.4
      # etcd
      - name: etcd
        tag:
          - 3.5.6-0
      # k8s components
      - name: kube-apiserver
        tag:
          - v1.25.6
      - name: kube-controller-manager
        tag:
          - v1.25.6
      - name: kube-scheduler
        tag:
          - v1.25.6
      - name: kubelet
        tag:
          - v1.25.6
      # coredns
      - name: coredns
        tag:
          - v1.10.1
      # pause
      - name: pause
        tag:
          - 3.8

files:
  - address: http://deploy.bocloud.k8s:40080/files/
    files:
      - bke_amd64
      - runc-amd64
      - cri-dockerd-0.3.9-amd64
      - cni-plugins-linux-amd64-v1.2.0.tgz
      - containerd-1.6.16-linux-amd64.tar.gz
      - kubectl-v1.25.6-amd64
      - etcdctl-v3.5.6-linux-amd64
      - charts.tar.gz-fake
      - nfsshare.tar.gz-fake
      - rpm.tar.gz